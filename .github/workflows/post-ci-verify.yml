name: Post-CI Verification

# Runs after the "CI" workflow finishes. When CI succeeded on a pull request,
# a Claude Code agent verifies/summarizes the type-check + e2e results and posts
# a concise summary comment on the PR. workflow_run only fires for this file once
# it lives on the default branch (main).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  verify:
    name: Claude verifies CI results
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            let number = run.pull_requests?.[0]?.number;
            if (!number) {
              // Fallback: resolve the open PR from the head branch (same-repo only).
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${run.head_branch}`,
              });
              number = prs.data.length ? prs.data[0].number : '';
            }
            core.setOutput('number', number || '');

      - name: Checkout PR head
        if: steps.pr.outputs.number != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Claude verifies and comments
        if: steps.pr.outputs.number != ''
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 6 --allowedTools Bash,Read"
          prompt: |
            The "CI" workflow (type-check + e2e) succeeded for PR #${{ steps.pr.outputs.number }} in ${{ github.repository }}.

            Do the following, then stop:
            1. Inspect the CI run: `gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }}` (add `--log-failed` or `--log` only if you need detail).
            2. Briefly verify and summarize the type-check and e2e results (acceptance criteria AC-1..AC-4 / AC-7).
            3. Post exactly ONE concise verification summary as a PR comment:
               `gh pr comment ${{ steps.pr.outputs.number }} --repo ${{ github.repository }} --body "<summary>"`
               Keep it short: overall pass/fail and a few key points. Do NOT commit or modify any files, and do NOT push.
