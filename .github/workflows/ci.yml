name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  type-check:
    name: type-check (shellcheck / hadolint / compose)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHELLCHECK_VERSION: "0.11.0"
      HADOLINT_VERSION: "2.14.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned lint tools
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" | tar -xJ
          sudo install "shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          rm -rf "shellcheck-v${SHELLCHECK_VERSION}"
          curl -fsSL -o hadolint "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          sudo install hadolint /usr/local/bin/hadolint
          rm -f hadolint
          shellcheck --version
          hadolint --version

      - name: shellcheck
        run: shellcheck bin/aidock docker/init-firewall.sh docker/entrypoint.sh test/guard_test.sh test/entrypoint_test.sh

      - name: bash syntax check
        run: |
          for f in bin/aidock docker/init-firewall.sh docker/entrypoint.sh test/guard_test.sh test/entrypoint_test.sh; do
              bash -n "$f"
          done

      - name: guard_workspace unit tests (SEC-8 / AC-2)
        # Hermetic, Docker-free: rejection paths exit 2 before compose is reached;
        # the host home is faked via a getent stub and the container via a docker
        # stub, so this runs in type-check without building the image.
        run: bash test/guard_test.sh

      - name: entrypoint.sh SEC-13 unit tests (AIDOCK_SKIP_FIREWALL / AIDOCK_INSECURE_ACK)
        # Hermetic, Docker-free: the fail-closed refusal path exits before
        # reaching init-firewall.sh or gosu; the acknowledged-skip path
        # explicitly skips init-firewall.sh and only needs a PATH-stubbed
        # gosu to observe that `exec gosu agent "$@"` was reached.
        run: bash test/entrypoint_test.sh

      - name: hadolint (Dockerfile)
        run: hadolint docker/Dockerfile

      - name: compose config validation
        # HOST_WORKSPACE has no default in compose.yaml (fail-closed for direct
        # `docker compose run`, see FR-2.4 / SEC-8(a)); supply a non-sensitive
        # placeholder for interpolation, mirroring bin/aidock's compose() wrapper.
        run: HOST_WORKSPACE=/nonexistent docker compose -f compose.yaml config -q

      - name: SEC-8(a) compose fail-closed without HOST_WORKSPACE
        # The negative of the step above: with HOST_WORKSPACE unset, the
        # ${HOST_WORKSPACE:?...} guard in compose.yaml must abort (non-zero), so a
        # bare `docker compose run` that bypasses bin/aidock cannot implicitly
        # mount the cwd (FR-2.4 / SEC-8(a) / AC-2).
        run: |
          set +e
          ( unset HOST_WORKSPACE; docker compose -f compose.yaml config -q )
          code=$?
          set -e
          echo "compose config exit (HOST_WORKSPACE unset): $code"
          [ "$code" -ne 0 ] || { echo "FAIL: compose must fail closed when HOST_WORKSPACE is unset"; exit 1; }

  e2e:
    name: e2e (acceptance criteria)
    runs-on: ubuntu-latest
    needs: type-check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Pin build/runtime UID/GID and workspace
        run: |
          echo "HOST_UID=$(id -u)"   >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)"   >> "$GITHUB_ENV"
          echo "HOST_WORKSPACE=$PWD" >> "$GITHUB_ENV"

      - name: Diagnose build prerequisites (network)
        run: |
          set +e
          echo "docker server: $(docker version --format '{{.Server.Version}}' 2>/dev/null)"
          docker pull node:22-slim >/dev/null 2>&1 && echo "DOCKERHUB_PULL=OK" || echo "DOCKERHUB_PULL=FAIL"
          curl -fsS --max-time 10 -o /dev/null https://deb.debian.org/debian/ && echo "DEBIAN_MIRROR=OK" || echo "DEBIAN_MIRROR=FAIL"
          curl -fsS --max-time 10 -o /dev/null https://registry.npmjs.org/ && echo "NPM_REGISTRY=OK" || echo "NPM_REGISTRY=FAIL"
          true

      - name: AC-1 build
        run: ./bin/aidock build --progress=plain

      - name: SEC-18 GID-denylist regression (build fails on sensitive group collision)
        # No automated test previously covered the sensitive-GID-reuse denylist
        # added to docker/Dockerfile on 2026-07-17 (shadow/sudo/adm/disk/
        # systemd-journal), so a future regression in that logic (e.g. the
        # denylist itself being trimmed, or the comparison being loosened)
        # could ship with CI green (found in a routine code review, see
        # docs/requirements.md SEC-18). Resolve the "shadow" group's GID
        # straight from the pinned base image referenced by the Dockerfile's
        # own FROM line, rather than hardcoding a GID that could drift on a
        # future node:22-slim rebuild, then assert that building with
        # HOST_GID set to that GID is refused. Placed right after AC-1 build
        # so Docker's layer cache reuses the unaffected earlier layers
        # (base image / apt-get / npm install) and only re-executes the
        # denylist-check RUN step itself.
        run: |
          set +e
          base_image="$(awk '/^FROM /{print $2; exit}' docker/Dockerfile)"
          shadow_gid="$(docker run --rm "$base_image" getent group shadow | cut -d: -f3)"
          echo "shadow GID in base image ($base_image): $shadow_gid"
          HOST_GID="$shadow_gid" docker compose -f compose.yaml build
          code=$?
          set -e
          echo "docker compose build exit (HOST_GID=shadow's GID): $code"
          [ "$code" -ne 0 ] || { echo "FAIL: build succeeded despite HOST_GID colliding with the sensitive group 'shadow' (SEC-18 denylist should have rejected it)"; exit 1; }
          echo "SEC-18 ok: HOST_GID colliding with a sensitive system group is rejected as documented"

      - name: AC-2 guard rejects $HOME and /
        run: |
          set +e
          ( cd "$HOME" && "$GITHUB_WORKSPACE/bin/aidock" run </dev/null )
          home_code=$?
          ( cd / && "$GITHUB_WORKSPACE/bin/aidock" run </dev/null )
          root_code=$?
          set -e
          echo "exit codes: \$HOME=$home_code /=$root_code"
          [ "$home_code" -eq 2 ] || { echo "FAIL: expected exit 2 from \$HOME, got $home_code"; exit 1; }
          [ "$root_code" -eq 2 ] || { echo "FAIL: expected exit 2 from /, got $root_code"; exit 1; }

      - name: AC-1/AC-4 startup probes (run profile)
        run: |
          # The entrypoint runs init-firewall.sh first (it blocks example.com and
          # checks api.anthropic.com, exiting non-zero on failure); then assert the
          # run-profile egress explicitly here (api.anthropic.com reachable).
          docker compose -f compose.yaml run --rm -T claude bash -lc \
            'curl -sS --max-time 8 -o /dev/null -w "%{http_code}\n" https://api.anthropic.com | grep -qE "^[1-9][0-9]{2}$"'

      - name: AC-4 claude.ai reachable (login profile)
        env:
          AIDOCK_PROFILE: login
        run: |
          docker compose -f compose.yaml run --rm -T claude bash -lc \
            'curl -sS --max-time 8 -o /dev/null -w "%{http_code}\n" https://claude.ai | grep -qE "^[1-9][0-9]{2}$"'

      - name: AC-4 SEC-17 non-443 port to an allowed host is blocked
        run: |
          # github.com is in CORE_HOSTS (admitted to allowed-hosts for HTTPS), but
          # also serves git-over-SSH on 22. The ACCEPT rule must be scoped to
          # tcp/443 only, so a raw TCP connect to :22 on the same allowed IP must
          # still be dropped by the terminal DROP rule.
          if docker compose -f compose.yaml run --rm -T claude bash -lc \
            'timeout 5 bash -c "echo >/dev/tcp/github.com/22" 2>/dev/null'; then
            echo "FAIL: github.com:22 was reachable despite SEC-17 (port-restricted allowlist)"
            exit 1
          fi
          echo "SEC-17 ok: github.com:22 is blocked as expected"

      - name: AC-1 git config is writable inside the sandbox (SEC-3)
        run: |
          docker compose -f compose.yaml run --rm -T claude bash -lc '
            set -e
            git config --global user.email test@example.com
            git config --global user.name "Test User"
            email="$(git config --global --get user.email)"
            [ "$email" = "test@example.com" ] || { echo "FAIL: ~/.gitconfig write did not persist"; exit 1; }
            echo "AC-1 git config ok"
          '

      - name: AC-1 ~/.claude.json is writable inside the sandbox (SEC-3)
        run: |
          # Exercises the same write path claude-code 1.0.40 itself uses for
          # ~/.claude.json (a direct fs.writeFileSync, not a temp-file+rename):
          # writing straight through the symlink into the writable .config
          # tmpfs. This does not prove every possible write strategy a future
          # claude-code version might use would also succeed (see SEC-3's
          # residual-risk note in docs/requirements.md) -- only that the
          # symlink target itself is writable, which is what this fix adds.
          docker compose -f compose.yaml run --rm -T claude bash -lc '
            set -e
            node -e "require(\"fs\").writeFileSync(process.env.HOME + \"/.claude.json\", JSON.stringify({ci: true}))"
            value="$(node -e "console.log(JSON.parse(require(\"fs\").readFileSync(process.env.HOME + \"/.claude.json\", \"utf8\")).ci)")"
            [ "$value" = "true" ] || { echo "FAIL: ~/.claude.json write did not persist"; exit 1; }
            echo "AC-1 claude.json ok"
          '

      - name: AC-3 user / no privilege escalation / capability set
        run: |
          docker compose -f compose.yaml run --rm -T claude bash -lc '
            set -e
            test "$(whoami)" = agent || { echo "FAIL: whoami != agent"; exit 1; }
            if command -v sudo >/dev/null 2>&1; then echo "FAIL: sudo must not be present (no escalation path)"; exit 1; fi
            # Verify the capability bounding set directly. This is seccomp-independent,
            # unlike a mount probe (default seccomp blocks mount regardless of caps).
            capbnd=$(grep -m1 ^CapBnd: /proc/self/status | cut -f2)
            echo "CapBnd=$capbnd"
            [ $(( 0x$capbnd & (1 << 21) )) -eq 0 ] || { echo "FAIL: CAP_SYS_ADMIN present in bounding set"; exit 1; }
            [ $(( 0x$capbnd & (1 << 12) )) -ne 0 ] || { echo "FAIL: CAP_NET_ADMIN missing from bounding set"; exit 1; }
            echo "AC-3 ok"
          '

      - name: AC-7 credential volume ownership
        run: |
          out="$(docker compose -f compose.yaml run --rm -T --no-deps --entrypoint sh claude -c 'stat -c "%u:%g" /home/agent/.claude')"
          out="$(printf '%s' "$out" | tr -d '\r')"
          expected="$(id -u):$(id -g)"
          echo "ownership: $out (expected $expected)"
          [ "$out" = "$expected" ] || { echo "FAIL: ownership mismatch"; exit 1; }
