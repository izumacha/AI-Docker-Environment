name: Claude Auth Smoke (temporary)

# TEMPORARY smoke test: confirms the CLAUDE_CODE_OAUTH_TOKEN secret authenticates
# the Claude Code Action (same auth path as post-ci-verify.yml). Triggered on push
# to this feature branch because workflow_dispatch/workflow_run only register from
# the default branch. DELETE this file once auth is confirmed.
on:
  workflow_dispatch:
  push:
    branches: ['claude/ci-workflow-setup-GYsRl']

permissions:
  contents: read

jobs:
  smoke:
    name: Claude auth smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify Claude authentication
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 1 --allowedTools Read"
          prompt: "Authentication smoke test. Reply with exactly: Claude auth OK. Do not modify files, do not post comments, do not run any other tools."
