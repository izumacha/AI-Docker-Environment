services:
  claude:
    build:
      context: ./docker
      args:
        HOST_UID: "${HOST_UID:-1000}"
        HOST_GID: "${HOST_GID:-1000}"
    image: aidock/claude:local
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=512m
      - /home/agent/.cache:size=512m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
      - /home/agent/.npm:size=128m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
      - /home/agent/.config:size=64m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    mem_limit: 4g
    pids_limit: 1024
    cpus: 2.0
    environment:
      NODE_OPTIONS: "--max-old-space-size=4096"
      AIDOCK_PROFILE: "${AIDOCK_PROFILE:-run}"
    volumes:
      - "${HOST_WORKSPACE:-./}:/workspace:rw"
      - claude-home:/home/agent/.claude
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  claude-home:
